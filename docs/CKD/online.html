<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f6f8;
  --surface: #ffffff;
  --border: #d0d5dd;
  --text: #1a1d23;
  --text-dim: #6b7280;
  --accent: #2563eb;
  --accent-hover: #3b82f6;
  --green: #16a34a;
  --red: #dc2626;
  --radius: 8px;
  --font: 'SF Mono', 'Cascadia Code', 'Consolas', 'Menlo', monospace;
  --gap: 16px;
}
body {
  background: var(--bg);
  color: var(--text);
  font: 14px/1.6 var(--font);
  min-height: 100vh;
  padding: 32px 16px;
}

/* ===== Layout ===== */
.app { max-width: 1100px; margin: 0 auto; }
.header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--gap); }
.header-bar h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.header-bar h1 small { font-size: 14px; color: var(--text-dim); font-weight: 400; margin-left: 12px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-link { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
.header-link:hover { text-decoration: underline; }

.secret-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: var(--gap);
  display: flex;
  gap: 20px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.secret-bar .field { flex: 1; min-width: 200px; margin-bottom: 0; }
.secret-bar .field-version { flex: 0 0 auto; min-width: 100px; }
.byte-display {
  flex-basis: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  line-height: 1.8;
  color: var(--text-dim);
  word-break: break-all;
}
.byte-display.ok { color: var(--green); }
.byte-display.err { color: var(--red); }
.byte-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.byte-count { font-weight: 400; color: var(--text-dim); }

.main-layout {
  display: grid;
  gap: var(--gap);
  grid-template-columns: 1fr 300px;
}
@media (max-width: 768px) {
  .main-layout { grid-template-columns: 1fr; }
  .log-panel { order: 99; }
}
.main-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.log-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  max-height: 600px;
}

/* ===== Tabs ===== */
.tab-bar {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
}
.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 12px 16px;
  font: 13px/1 var(--font);
  font-weight: 900;
  color: var(--text-dim);
  cursor: pointer;
  transition: all .15s;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--red); border-bottom-color: var(--red); }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* ===== Fields ===== */
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
label {
  display: block;
  font-size: 12px;
  color: var(--text-dim);
  margin-bottom: 4px;
  font-weight: 500;
}
input, select {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font: 13px/1.5 var(--font);
  padding: 8px 12px;
  outline: none;
  transition: border-color .15s;
}
input:focus, select:focus { border-color: var(--accent); }
input[readonly] { color: var(--text-dim); cursor: default; }
input[readonly]:focus { border-color: var(--border); }
input.error { border-color: var(--red); }
select { cursor: pointer; }

/* ===== Input Group ===== */
.input-group { display: flex; gap: 6px; }
.input-group input { flex: 1; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 18px;
  font: 13px/1 var(--font);
  font-weight: 500;
  cursor: pointer;
  transition: background .15s;
}
.btn:hover { background: var(--accent-hover); }
.btn:active { transform: scale(0.97); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  cursor: pointer;
  font-size: 14px;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-icon:hover { border-color: var(--accent); background: rgba(37,99,235,0.06); }
.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }
.btn-red { background: transparent; color: var(--red); border: 1px solid var(--red); }
.btn-red:hover { background: var(--red); color: #fff; }

/* ===== Status Badge ===== */
.status-badge { font-size: 12px; display: flex; align-items: center; gap: 6px; font-weight: 500; }
.status-badge::before { content: ''; width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.status-badge.loaded { color: #166534; }
.status-badge.loaded::before { background: #16a34a; }
.status-badge.pending { color: #92400e; }
.status-badge.pending::before { background: #f59e0b; }
.status-badge.error { color: #991b1b; }
.status-badge.error::before { background: #dc2626; }

/* ===== Result Row ===== */
.result-row {
  display: flex; gap: 8px; align-items: flex-start;
  margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);
}
.result-row label { white-space: nowrap; padding-top: 8px; }
.result-row input { flex: 1; }

/* ===== Log ===== */
.log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.log-header h2 { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0; }
#log-content {
  flex: 1;
  overflow-y: auto;
  padding: 8px 12px;
  font-size: 12px;
  line-height: 1.7;
}
#log-content:empty::after { content: '暂无操作记录'; color: var(--text-dim); font-style: italic; }
.log-entry { padding: 4px 0; border-bottom: 1px solid var(--border); word-break: break-all; }
.log-entry:last-child { border-bottom: none; }
.log-time { color: var(--text-dim); margin-right: 8px; }
.log-ok { color: var(--green); }
.log-err { color: var(--red); }
.log-input { color: var(--text-dim); }
h2 {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

/* ===== Vector Tab ===== */
.vector-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.vector-item:last-child { border-bottom: none; }
.vector-desc { flex: 1; font-size: 13px; }
.vector-status { font-size: 12px; font-weight: 500; white-space: nowrap; }
.vector-status.pass { color: var(--green); }
.vector-status.fail { color: var(--red); }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--green); color: #fff;
  padding: 8px 20px; border-radius: 6px;
  font: 13px var(--font);
  opacity: 0; transition: opacity .3s;
  pointer-events: none;
  z-index: 2000;
}
.toast.show { opacity: 1; }

/* ===== Utils ===== */
.loading { opacity: 0.6; pointer-events: none; }
.err-msg { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }
</style>
</head>

<script src="https://unpkg.com/channel-key-derivation/dist/ckd.umd.js"></script>
<script>
(function () {
  const badge = document.getElementById('status-badge');
  const UMD = window.CKD;

  if (!UMD) {
    badge.textContent = '加载中';
    badge.className = 'status-badge pending';
    const s = document.createElement('script');
    s.src = './dist/ckd.umd.js';
    s.onload = () => { badge.textContent = '已加载'; badge.className = 'status-badge loaded'; location.reload(); };
    s.onerror = () => { badge.textContent = '加载失败'; badge.className = 'status-badge error'; };
    document.body.appendChild(s);
    return;
  }

  badge.textContent = '已加载';
  badge.className = 'status-badge loaded';
  const { CKD: CKDClass, CkdError, ErrInvalidPurpose, ErrInvalidDerivedKey } = UMD;

  const $ = id => document.getElementById(id);
  const B64URL_RE = /^[A-Za-z0-9_-]+$/;

  // ===== Init version select =====
  const versionEl = $('version');
  for (let i = 1; i <= 15; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = i;
    versionEl.appendChild(opt);
  }

  // ===== DOM refs =====
  const secretEl = $('secret');
  const deriveId = $('derive-id');
  const derivePurpose = $('derive-purpose');
  const deriveResult = $('derive-result');
  const deriveBtn = $('derive-btn');
  const parseKey = $('parse-key');
  const parsePurpose = $('parse-purpose');
  const parseResult = $('parse-result');
  const parseBtn = $('parse-btn');
  const configErr = $('config-err');
  const logContent = $('log-content');
  const toast = $('toast');

  // ===== Helpers =====
  function secretToBytes(str) {
    str = str.trim();
    if (!B64URL_RE.test(str)) throw new Error('含非 base64URL 字符');
    let b64 = str.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    let bin;
    try { bin = atob(b64); } catch (_) { throw new Error('不是有效的 base64URL 编码（长度或结构无效）'); }
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function log(type, input, output) {
    const t = new Date().toLocaleTimeString();
    const el = document.createElement('div');
    el.className = 'log-entry';
    const icon = type === 'ok' ? '✓' : '✗';
    const cls = type === 'ok' ? 'log-ok' : 'log-err';
    el.innerHTML = '<span class="log-time">[' + t + ']</span><span class="' + cls + '">' + icon + '</span> <span class="log-input">' + input + '</span> → ' + output;
    logContent.prepend(el);
    if (logContent.children.length > 200) logContent.lastChild.remove();
  }

  function readConfig() {
    const secretStr = secretEl.value.trim();
    if (!secretStr) { configErr.textContent = '请输入主密钥'; configErr.style.display = 'block'; return null; }
    let secret;
    try { secret = secretToBytes(secretStr); } catch (e) {
      configErr.textContent = '密钥含非 base64URL 字符（仅支持 A-Za-z0-9_-）'; configErr.style.display = 'block'; return null;
    }
    const version = parseInt(versionEl.value, 10);
    if (isNaN(version) || version < 1 || version > 15) {
      configErr.textContent = '版本号必须在 [1, 15] 范围内'; configErr.style.display = 'block'; return null;
    }
    configErr.style.display = 'none';
    return { secret, version };
  }

  function makeCKD(config) {
    try {
      return new CKDClass({
        currentVersion: config.version,
        secretsByVersion: { [config.version]: config.secret },
      });
    } catch (e) {
      configErr.textContent = '创建 CKD 实例失败: ' + e.message;
      configErr.style.display = 'block';
      return null;
    }
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.6' : '1';
  }

  // ===== Secret toggle =====
  $('toggle-secret').addEventListener('click', () => {
    const isPassword = secretEl.type === 'password';
    secretEl.type = isPassword ? 'text' : 'password';
    $('toggle-secret').textContent = isPassword ? '🙈' : '👁';
  });

  // ===== Secret byte display =====
  const secretByteContent = $('secret-byte-content');
  const secretByteCount = $('secret-byte-count');
  const secretBytesEl = $('secret-bytes');
  function updateSecretBytes() {
    const val = secretEl.value.trim();
    if (!val) {
      secretByteContent.textContent = '等待输入...';
      secretByteCount.textContent = '';
      secretBytesEl.className = 'byte-display';
      return;
    }
    if (!B64URL_RE.test(val)) {
      secretByteContent.textContent = '含非法字符';
      secretByteCount.textContent = '';
      secretBytesEl.className = 'byte-display err';
      return;
    }
    try {
      const bytes = secretToBytes(val);
      const hexes = Array.from(bytes).map(b => '0x' + b.toString(16).padStart(2, '0'));
      const lines = [];
      for (let i = 0; i < hexes.length; i += 8) {
        lines.push(hexes.slice(i, i + 8).join(', '));
      }
      secretByteContent.textContent = '[ ' + lines.join(',\n       ') + ' ]';
      secretByteCount.textContent = bytes.length + ' bytes';
      secretBytesEl.className = 'byte-display ok';
    } catch (e) {
      secretByteContent.textContent = '解码失败: ' + e.message;
      secretByteCount.textContent = '';
      secretBytesEl.className = 'byte-display err';
    }
  }
  secretEl.addEventListener('input', updateSecretBytes);

  // ===== Tab switching =====
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      $('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ===== Derive =====
  deriveBtn.addEventListener('click', async () => {
    const config = readConfig();
    if (!config) return;
    const ckd = makeCKD(config);
    if (!ckd) return;

    const resourceId = deriveId.value.trim();
    if (!resourceId) { deriveResult.value = ''; deriveResult.className = 'error'; return; }
    const purpose = derivePurpose.value.trim();
    if (!purpose) { deriveResult.value = ''; deriveResult.className = 'error'; return; }

    setLoading(deriveBtn, true);
    try {
      const key = await ckd.derive(new TextEncoder().encode(resourceId), purpose);
      deriveResult.value = key;
      deriveResult.className = '';
      log('ok', 'derive("' + resourceId + '", "' + purpose + '")', key);
    } catch (e) {
      const msg = e === ErrInvalidPurpose ? '无效的用途标识' : (e.message || String(e));
      deriveResult.value = '错误: ' + msg;
      deriveResult.className = 'error';
      log('err', 'derive("' + resourceId + '", "' + purpose + '")', msg);
    }
    setLoading(deriveBtn, false);
  });

  $('copy-derive').addEventListener('click', () => {
    const val = deriveResult.value;
    if (!val || val.startsWith('错误')) return;
    navigator.clipboard.writeText(val).then(() => showToast('已复制')).catch(() => {});
  });

  // ===== Parse =====
  parseBtn.addEventListener('click', async () => {
    const config = readConfig();
    if (!config) return;
    const ckd = makeCKD(config);
    if (!ckd) return;

    const key = parseKey.value.trim();
    if (!key) { parseResult.value = ''; parseResult.className = 'error'; return; }
    const purpose = parsePurpose.value.trim();
    if (!purpose) { parseResult.value = ''; parseResult.className = 'error'; return; }

    setLoading(parseBtn, true);
    try {
      const rid = await ckd.parse(key, purpose);
      parseResult.value = new TextDecoder().decode(rid);
      parseResult.className = '';
      log('ok', 'parse("' + key + '", "' + purpose + '")', new TextDecoder().decode(rid));
    } catch (e) {
      const msg = e === ErrInvalidDerivedKey || e === ErrInvalidPurpose
        ? (e === ErrInvalidPurpose ? '无效的用途标识' : '无效的派生密钥')
        : (e.message || String(e));
      parseResult.value = '错误: ' + msg;
      parseResult.className = 'error';
      log('err', 'parse("' + key + '", "' + purpose + '")', msg);
    }
    setLoading(parseBtn, false);
  });

  $('copy-parse').addEventListener('click', () => {
    const val = parseResult.value;
    if (!val || val.startsWith('错误')) return;
    navigator.clipboard.writeText(val).then(() => showToast('已复制')).catch(() => {});
  });

  // ===== Vectors =====
  const vectors = [
    {
      secret: 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8',
      version: 1, resourceId: 'channel_12345', purpose: 'webhook',
      expectedKey: 'AXnjdNQal5XDP66STw0pQbOzRi3AdGmiX1Xi5ZxO',
    },
    {
      secret: 'AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8',
      version: 1, resourceId: 'user_67890', purpose: 'sse',
      expectedKey: 'Aez5p0zdhSjxmsgy92MfMhiMlhAbRxlldWcl',
    },
    {
      secret: '_-7dzLuqmYh3ZlVEMyIRAP_u3cy7qpmId2ZVRDMiEQA',
      version: 2, resourceId: 'channel_12345', purpose: 'api_token',
      expectedKey: 'ApUFLCCTYol1B57b459DrXW8SiQaJLaJRUx246YY',
    },
  ];

  async function runVector(n) {
    const v = vectors[n - 1];
    const statusEl = $('vec-status-' + n);
    statusEl.textContent = '运行中...';
    statusEl.className = 'vector-status';

    secretEl.value = v.secret;
    updateSecretBytes();
    versionEl.value = v.version;
    deriveId.value = v.resourceId;
    derivePurpose.value = v.purpose;
    deriveResult.value = '';
    deriveResult.className = '';
    configErr.style.display = 'none';

    try {
      const config = readConfig();
      if (!config) { statusEl.textContent = '✗ 配置错误'; statusEl.className = 'vector-status fail'; return; }
      const ckd = makeCKD(config);
      if (!ckd) { statusEl.textContent = '✗ 配置错误'; statusEl.className = 'vector-status fail'; return; }

      const key = await ckd.derive(new TextEncoder().encode(v.resourceId), v.purpose);
      deriveResult.value = key;
      deriveResult.className = '';

      const rid = await ckd.parse(key, v.purpose);
      const ridStr = new TextDecoder().decode(rid);

      const deriveOk = key === v.expectedKey;
      const parseOk = ridStr === v.resourceId;
      const allOk = deriveOk && parseOk;

      statusEl.textContent = allOk ? '✓ 通过' : '✗ 不匹配';
      statusEl.className = 'vector-status ' + (allOk ? 'pass' : 'fail');

      const detail = 'derive=' + key + ' parse=' + ridStr + ' expected=' + v.expectedKey;
      log(allOk ? 'ok' : 'err', '向量' + n + ' (' + v.purpose + ' / ' + v.resourceId + ')', detail);

      if (allOk) showToast('向量 ' + n + ' 通过 ✓');
    } catch (e) {
      const msg = e.message || String(e);
      statusEl.textContent = '✗ 错误';
      statusEl.className = 'vector-status fail';
      log('err', '向量' + n, msg);
    }
  }

  document.querySelectorAll('[data-vector]').forEach(el => {
    el.addEventListener('click', () => runVector(parseInt(el.dataset.vector, 10)));
  });

  $('run-all-vectors').addEventListener('click', async () => {
    for (let i = 1; i <= 3; i++) await runVector(i);
  });

  // ===== Clear Log =====
  $('clear-log').addEventListener('click', () => { logContent.innerHTML = ''; });

  // ===== Enter key support =====
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (el.id.startsWith('derive-')) deriveBtn.click();
        else if (el.id.startsWith('parse-')) parseBtn.click();
      }
    });
  });

  // ===== Secret real-time validation =====
  secretEl.addEventListener('input', () => {
    const val = secretEl.value.trim();
    if (val && !B64URL_RE.test(val)) {
      secretEl.classList.add('error');
      configErr.textContent = '含非 base64URL 字符（仅支持 A-Za-z0-9_-）';
      configErr.style.display = 'block';
    } else {
      secretEl.classList.remove('error');
      configErr.style.display = 'none';
    }
  });
})();
</script>
</body>
</html>
