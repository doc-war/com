<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白色背景转透明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f8f9ff;
        }
        
        .upload-area.dragging {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        input[type="file"] {
            display: none;
        }
        
        .upload-text {
            color: #667eea;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 13px;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        label {
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        
        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            background: #ddd;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        
        .threshold-value {
            min-width: 40px;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        
        .preview-area {
            display: none;
            margin-top: 25px;
        }
        
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .preview-box {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .preview-label {
            background: #f5f5f5;
            padding: 10px;
            font-size: 13px;
            color: #666;
            font-weight: 500;
        }
        
        .preview-canvas-wrapper {
            background-image: 
                linear-gradient(45deg, #e0e0e0 25%, transparent 25%),
                linear-gradient(-45deg, #e0e0e0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e0e0e0 75%),
                linear-gradient(-45deg, transparent 75%, #e0e0e0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }
        
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 500;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        @media (max-width: 600px) {
            .preview-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>白色背景转透明</h1>
        <p class="subtitle">上传图片,自动将白色背景转换为透明</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-text">点击或拖拽图片到这里</div>
            <div class="upload-hint">支持 JPG, PNG 格式</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="controls">
            <label>容差值:</label>
            <input type="range" id="threshold" min="0" max="100" value="30">
            <span class="threshold-value" id="thresholdValue">30</span>
        </div>
        
        <div class="preview-area" id="previewArea">
            <div class="preview-container">
                <div class="preview-box">
                    <div class="preview-label">原图</div>
                    <div class="preview-canvas-wrapper">
                        <canvas id="originalCanvas"></canvas>
                    </div>
                </div>
                <div class="preview-box">
                    <div class="preview-label">透明背景</div>
                    <div class="preview-canvas-wrapper">
                        <canvas id="resultCanvas"></canvas>
                    </div>
                </div>
            </div>
            <button id="downloadBtn">下载透明图片</button>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const thresholdSlider = document.getElementById('threshold');
        const thresholdValue = document.getElementById('thresholdValue');
        const previewArea = document.getElementById('previewArea');
        const originalCanvas = document.getElementById('originalCanvas');
        const resultCanvas = document.getElementById('resultCanvas');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let currentImage = null;
        
        // 上传区域点击
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // 拖拽上传
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleImage(file);
            }
        });
        
        // 文件选择
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleImage(file);
            }
        });
        
        // 容差值变化
        thresholdSlider.addEventListener('input', (e) => {
            thresholdValue.textContent = e.target.value;
            if (currentImage) {
                processImage(currentImage, parseInt(e.target.value));
            }
        });
        
        // 处理图片
        function handleImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    processImage(img, parseInt(thresholdSlider.value));
                    previewArea.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        // 图片处理
        function processImage(img, threshold) {
            // 显示原图
            originalCanvas.width = img.width;
            originalCanvas.height = img.height;
            const originalCtx = originalCanvas.getContext('2d');
            originalCtx.drawImage(img, 0, 0);
            
            // 处理透明
            resultCanvas.width = img.width;
            resultCanvas.height = img.height;
            const resultCtx = resultCanvas.getContext('2d');
            resultCtx.drawImage(img, 0, 0);
            
            const imageData = resultCtx.getImageData(0, 0, img.width, img.height);
            const data = imageData.data;
            
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];
                
                // 检测白色(考虑容差)
                const diff = Math.abs(r - 255) + Math.abs(g - 255) + Math.abs(b - 255);
                if (diff < threshold * 3) {
                    data[i + 3] = 0; // 设置为透明
                }
            }
            
            resultCtx.putImageData(imageData, 0, 0);
        }
        
        // 下载
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'transparent-image.png';
            link.href = resultCanvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
